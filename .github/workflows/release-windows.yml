name: Release Windows Installer

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject OAuth client secret
        run: node -e "require('fs').writeFileSync('oauth-config.js', 'module.exports = { GOOGLE_CALENDAR_CLIENT_SECRET: ' + JSON.stringify(process.env.GCAL_CLIENT_SECRET || '') + ' };\n')"
        env:
          GCAL_CLIENT_SECRET: ${{ secrets.GOOGLE_CALENDAR_CLIENT_SECRET }}

      - name: Build and publish Windows installer
        run: npm run release:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish draft release
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          for ($i = 0; $i -lt 18; $i++) {
            gh release view $tag --repo $env:GITHUB_REPOSITORY | Out-Null
            if ($LASTEXITCODE -eq 0) { break }
            Start-Sleep -Seconds 10
          }
          gh release edit $tag --draft=false --repo $env:GITHUB_REPOSITORY
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
