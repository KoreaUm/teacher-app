<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쌤포트</title>
<link rel="stylesheet" href="styles.css">
<script src="../node_modules/firebase/firebase-app-compat.js"></script>
<script src="../node_modules/firebase/firebase-auth-compat.js"></script>
<script src="../node_modules/firebase/firebase-firestore-compat.js"></script>
<script src="../node_modules/firebase/firebase-functions-compat.js"></script>
<script src="firebase/config.js"></script>
<script src="app_manual.js"></script>
<script src="official_document_rules.js"></script>
<script src="sv_document_templates.js"></script>
</head>
<body>
<div id="titlebar">
  <div id="titlebar-drag">
    <span id="app-title"><img src="../assets/ssamport-logo.svg" alt="">쌤포트</span>
  </div>
  <div id="titlebar-btns">
    <button id="min-btn" title="최소화">─</button>
    <button id="max-btn" title="최대화">▢</button>
    <button id="close-btn" title="닫기">✕</button>
  </div>
</div>

<div id="app-layout">
  <div id="content-wrap">
    <header id="topbar">
      <div id="topbar-left">
        <button id="home-btn" class="topbar-btn home-btn" title="홈 대시보드">🏠</button>
        <span id="class-info">--학년 --반 · --교사</span>
        <div class="vdiv"></div>
        <div id="global-search" class="global-search">
          <input id="global-search-input" class="global-search-input" placeholder="기능 검색... 예: 출석, 급식, 공지" autocomplete="off">
          <div id="global-search-results" class="global-search-results" style="display:none"></div>
        </div>
      </div>
      <div id="topbar-right">
        <button id="update-btn" class="topbar-btn" style="display:none">업데이트 확인</button>
        <button id="manual-btn" class="topbar-btn" title="기능 설명서">설명서</button>
        <button id="edit-layout-btn" class="topbar-btn" style="display:none">배열 편집</button>
        <button id="widget-mode-btn" class="topbar-btn" style="display:none">위젯 모드</button>
        <div style="position:relative">
          <button id="opacity-btn" class="topbar-btn" title="투명도 조절">투명도</button>
          <div id="opacity-panel" style="display:none;position:absolute;right:0;top:38px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;box-shadow:var(--shadow-md);z-index:9999;align-items:center;gap:10px;white-space:nowrap;min-width:220px">
            <span style="font-size:12px;color:var(--text2)">투명도</span>
            <input id="opacity-slider" type="range" min="20" max="100" value="100" style="flex:1;accent-color:var(--accent)">
            <span id="opacity-lbl" style="font-size:12px;font-weight:600;color:var(--accent);width:34px;text-align:right">100%</span>
          </div>
        </div>
        <div style="position:relative">
          <button id="ai-settings-btn" class="topbar-btn" title="AI 설정">⚙️ AI</button>
          <div id="ai-settings-panel" style="display:none;position:absolute;right:0;top:38px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 18px 14px;box-shadow:var(--shadow-md);z-index:9999;min-width:300px;max-width:340px">
            <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px">AI 엔진 선택</div>
            <div id="ai-quick-engine-list" style="display:grid;gap:6px;margin-bottom:14px"></div>
            <div id="ai-quick-external" style="display:none;gap:8px;flex-direction:column;margin-bottom:8px">
              <div>
                <div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px">외부 AI 제공업체</div>
                <select id="ai-quick-provider" class="input" style="width:100%;font-size:13px">
                  <option value="claude">Claude (Anthropic)</option>
                  <option value="gemini">Gemini (Google)</option>
                </select>
              </div>
              <div>
                <div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px">API 키</div>
                <input id="ai-quick-key" class="input" type="password" placeholder="API 키 입력" style="width:100%;font-size:13px;box-sizing:border-box">
              </div>
              <div>
                <div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px">모델</div>
                <select id="ai-quick-model" class="input" style="width:100%;font-size:13px"></select>
              </div>
            </div>
            <button id="ai-quick-save" class="btn btn-primary btn-sm" style="width:100%">저장</button>
          </div>
        </div>
        <button id="ai-helper-btn" class="topbar-btn ai-helper-open" title="AI 도우미">AI 도우미</button>
        <div class="vdiv"></div>
        <span id="header-date"></span>
      </div>
    </header>
    <nav id="page-tabs"></nav>

    <main id="page-content"></main>
  </div>
</div>

<aside id="ai-helper-panel" class="ai-helper-panel" aria-hidden="true">
  <div class="ai-helper-head">
    <div>
      <div class="ai-helper-kicker">AI Assistant</div>
      <strong>AI 도우미</strong>
    </div>
    <button id="ai-helper-close" class="ai-helper-close" title="닫기">×</button>
  </div>
  <div id="ai-helper-status" class="ai-helper-status">AI 상태를 확인하는 중...</div>
  <div id="ai-helper-messages" class="ai-helper-messages"></div>
  <div class="ai-helper-suggestions">
    <button data-ai-prompt="현재 페이지에서 무엇을 도와줄 수 있어?">이 페이지 도움</button>
    <button data-ai-prompt="상담 기록을 더 전문적으로 쓰는 방법을 알려줘.">상담 기록 팁</button>
    <button data-ai-prompt="후속 조치 문장을 예시로 만들어줘.">후속 조치 예시</button>
    <button id="ai-helper-manual-pdf" type="button">설명서 PDF</button>
  </div>
  <div class="ai-helper-input-row">
    <textarea id="ai-helper-input" placeholder="무엇이든 물어보세요. 예: 이 상담 내용을 요약해줘"></textarea>
    <button id="ai-helper-send" class="btn btn-primary btn-sm">전송</button>
  </div>
</aside>
<div id="ai-helper-backdrop" class="ai-helper-backdrop"></div>

<script>
(function () {
  var api = window.api;
  var pageCache = {};
  var currentPage = "dashboard";
  var openGroupKey = "";

  // ── 업무 효율성 추적 ──────────────────────────────────────
  var _usagePageStartTime = null;
  var _usageCurrentPage = null;
  var USAGE_TRACK_PAGES = ['students','attendance','daily_memo','timetable','counseling',
    'observations','lessons','assessments','submissions','statistics','ai_analysis',
    'todos','official_document','lesson_materials','school_calendar','meal'];

  function _usageSaveEntry(page, durationSec) {
    if (!page || USAGE_TRACK_PAGES.indexOf(page) < 0) return;
    if (durationSec < 3) return; // 3초 미만은 무시 (실수로 잠깐 누른 것)
    var now = new Date();
    var ym = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
    var key = 'usage_' + ym;
    api.getSetting(key, '').then(function (raw) {
      var arr = [];
      try { if (raw) arr = JSON.parse(raw); } catch (_) {}
      arr.push({ page: page, durationSec: Math.round(durationSec), date: now.toISOString().slice(0, 10) });
      // 최대 5000건 유지
      if (arr.length > 5000) arr = arr.slice(arr.length - 5000);
      api.setSetting(key, JSON.stringify(arr)).catch(function () {});
    }).catch(function () {});
  }

  function _usageOnLeave(nextPage) {
    if (_usageCurrentPage && _usagePageStartTime) {
      var elapsed = (Date.now() - _usagePageStartTime) / 1000;
      _usageSaveEntry(_usageCurrentPage, elapsed);
    }
    _usageCurrentPage = (USAGE_TRACK_PAGES.indexOf(nextPage) >= 0) ? nextPage : null;
    _usagePageStartTime = _usageCurrentPage ? Date.now() : null;
  }
  // ─────────────────────────────────────────────────────────
  var closeGroupTimer = null;
  var widgetMode = false;
  var firebaseApp = null;
  var firebaseAuth = null;
  var firebaseDb = null;
  var firebaseFunctions = null;
  var authUser = null;
  var authProfile = null;
  var authOverlayEl = null;
  var authScreenMode = "login";
  var authPendingMessage = "";
  var authBootResolved = false;
  var cloudSyncTimer = null;
  var sharedSyncTimer = null;
  var cloudSubscriptions = [];
  var sessionUnsubscribe = null;
  var sessionHeartbeatTimer = null;
  var sessionTakeoverInProgress = false;
  var sharedLocalWriteUntil = {
    todos: 0,
    timetable: 0
  };
  var remoteApplyDepth = 0;
  var originalSetSetting = api.setSetting.bind(api);
  var CLOUD_SYNC_KEYS = [
    "class_year",
    "class_num",
    "teacher_name",
    "weather_region",
    "edu_office_code",
    "school_code",
    "quick_links_config",
    "menu_groups_config",
    "dashboard_layout_v4",
    "hidden_widgets",
    "class_timetable_subject_colors",
    "class_timetable_json",
    "class_timetable_file_name",
    "teacher_timetable_number_colors_enabled",
    "teacher_timetable_number_colors"
  ];
  var CLOUD_BLOCKED_SETTING_KEYS = [
    "custom_calendar_events",
    "gcal_client_id",
    "gcal_client_secret",
    "gcal_refresh_token",
    "todo_manual_order"
  ];

  api.setSetting = function (key, value) {
    return Promise.resolve(originalSetSetting(key, value)).then(function (result) {
      if (!isApplyingRemoteData()) pushCloudSettingNow(key, value);
      return result;
    });
  };
  // *Raw 변형은 Google 동기화를 트리거하지 않는다. 양방향 동기화가 원격 변경을
  // 로컬에 반영할 때 다시 원격으로 푸시되는 루프를 막기 위해 Raw를 사용한다.
  var originalAddTodo = (api.addTodoRaw || api.addTodo).bind(api);
  var originalUpdateTodo = (api.updateTodoRaw || api.updateTodo).bind(api);
  var originalToggleTodo = (api.toggleTodoRaw || api.toggleTodo).bind(api);
  var originalDeleteTodo = (api.deleteTodoRaw || api.deleteTodo).bind(api);
  var originalSetTodoGcalId = api.setTodoGcalId.bind(api);
  var originalSetTodoGoogleTaskId = api.setTodoGoogleTaskId ? api.setTodoGoogleTaskId.bind(api) : null;
  var originalSetTimetableCell = api.setTimetableCell.bind(api);
  var originalClearTimetable = api.clearTimetable.bind(api);
  var originalReplaceTimetable = api.replaceTimetable ? api.replaceTimetable.bind(api) : null;

  function getGoogleTasksToken() {
    if (!api.getSetting || !api.gcalRefreshToken) return Promise.resolve(null);
    return api.getSetting("gcal_refresh_token", "").then(function (refreshToken) {
      if (!refreshToken) return null;
      return api.gcalRefreshToken(refreshToken).then(function (result) {
        return result && result.access_token ? result.access_token : null;
      });
    }).catch(function () {
      return null;
    });
  }

  function addOneDay(dateText) {
    var date = String(dateText || "");
    if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) return "";
    var d = new Date(date + "T00:00:00");
    d.setDate(d.getDate() + 1);
    return d.toISOString().slice(0, 10);
  }

  function normalizeCalendarDate(dateText) {
    var raw = String(dateText || "").replace(/\D/g, "");
    if (!/^\d{8}$/.test(raw)) return "";
    return raw.slice(0, 4) + "-" + raw.slice(4, 6) + "-" + raw.slice(6, 8);
  }

  function buildTodoCalendarEvent(payload) {
    var start = normalizeCalendarDate(payload && payload.deadline);
    if (!start) return null;
    return {
      summary: "[할일] " + String(payload.title || "쌤포트 할일"),
      description: [
        "쌤포트 할일에서 자동 추가됨",
        payload && payload.priority ? "중요도: " + payload.priority : "",
        payload && payload.category ? "카테고리: " + payload.category : ""
      ].filter(Boolean).join("\n"),
      start: { date: start },
      end: { date: addOneDay(start) || start },
      colorId: payload && payload.priority === "높음" ? "11" : payload && payload.priority === "낮음" ? "2" : "5",
      reminders: { useDefault: false, overrides: [{ method: "popup", minutes: 480 }] }
    };
  }

  function syncTodoCalendarAfterAdd(id, payload) {
    if (!id || !api.gcalAddEvent || !api.setTodoGcalId) return Promise.resolve(false);
    var event = buildTodoCalendarEvent(payload);
    if (!event) return Promise.resolve(false);
    return getGoogleTasksToken().then(function (token) {
      if (!token) return false;
      return api.gcalAddEvent(token, event).then(function (created) {
        if (created && created.id) return api.setTodoGcalId(id, created.id).then(function () { return true; });
        if (created && created.error) {
          var msg = (created.error && created.error.message) || JSON.stringify(created.error);
          toast('📅 Google 캘린더 저장 실패: ' + msg, 'error', 6000);
        }
        return false;
      });
    }).catch(function (error) {
      toast('📅 Google 캘린더 저장 실패: ' + String(error), 'error', 6000);
      return false;
    });
  }

  function syncTodoCalendarAfterUpdate(id, payload) {
    if (!id || !api.gcalUpdateEvent || !api.getTodoGcalId) return Promise.resolve(false);
    var event = buildTodoCalendarEvent(payload);
    return Promise.all([getGoogleTasksToken(), api.getTodoGcalId(id)]).then(function (values) {
      var token = values[0];
      var eventId = values[1];
      if (!token) return false;
      if (!event && eventId && api.gcalDeleteEvent) {
        return api.gcalDeleteEvent(token, eventId).then(function () {
          return api.setTodoGcalId ? api.setTodoGcalId(id, "") : true;
        });
      }
      if (!event) return false;
      if (!eventId) return syncTodoCalendarAfterAdd(id, payload);
      return api.gcalUpdateEvent(token, eventId, event).then(function (updated) {
        if (updated && updated.error) console.warn("google calendar todo update failed", updated.error);
        return !!(updated && !updated.error);
      });
    }).catch(function (error) {
      console.warn("google calendar todo update failed", error);
      return false;
    });
  }

  function deleteTodoCalendarEvent(id) {
    if (!id || !api.gcalDeleteEvent || !api.getTodoGcalId) return Promise.resolve(false);
    return Promise.all([getGoogleTasksToken(), api.getTodoGcalId(id)]).then(function (values) {
      var token = values[0];
      var eventId = values[1];
      if (!token || !eventId) return false;
      return api.gcalDeleteEvent(token, eventId);
    }).catch(function (error) {
      console.warn("google calendar todo delete failed", error);
      return false;
    });
  }

  window.addGoogleCalendarCustomEvent = function (eventItem) {
    if (!api.gcalAddEvent) return Promise.resolve(null);
    var start = normalizeCalendarDate(eventItem && eventItem.date);
    if (!start) return Promise.resolve(null);
    var event = {
      summary: String(eventItem.name || "쌤포트 일정"),
      description: "쌤포트 캘린더에서 추가됨",
      start: { date: start },
      end: { date: addOneDay(start) || start },
      colorId: "7"
    };
    return getGoogleTasksToken().then(function (token) {
      if (!token) return null;
      return api.gcalAddEvent(token, event).then(function (created) {
        return created && created.id ? created.id : null;
      });
    }).catch(function (error) {
      console.warn("google calendar custom event add failed", error);
      return null;
    });
  };

  window.deleteGoogleCalendarCustomEvent = function (eventId) {
    if (!eventId || !api.gcalDeleteEvent) return Promise.resolve(false);
    return getGoogleTasksToken().then(function (token) {
      if (!token) return false;
      return api.gcalDeleteEvent(token, eventId).then(function () { return true; });
    }).catch(function (error) {
      console.warn("google calendar custom event delete failed", error);
      return false;
    });
  };

  function buildGoogleTaskFromLocal(id, payload) {
    return {
      id: id,
      title: payload && payload.title ? payload.title : "",
      deadline: payload && payload.deadline ? payload.deadline : "",
      priority: payload && payload.priority ? payload.priority : "보통",
      category: payload && payload.category ? payload.category : "기타",
      source_text: payload && payload.source_text ? payload.source_text : "",
      is_done: payload && payload.is_done ? 1 : 0
    };
  }

  function syncGoogleTaskAfterAdd(id, payload) {
    if (!id || !api.googleTasksAddTask || !api.setTodoGoogleTaskId) return Promise.resolve(false);
    return getGoogleTasksToken().then(function (token) {
      if (!token) return false;
      return api.googleTasksAddTask(token, buildGoogleTaskFromLocal(id, payload)).then(function (created) {
        if (created && created.id) return api.setTodoGoogleTaskId(id, created.id).then(function () { return true; });
        if (created && created.error) console.warn("google task add failed", created.error);
        return false;
      });
    }).catch(function (error) {
      console.warn("google task add failed", error);
      return false;
    });
  }

  function syncGoogleTaskAfterUpdate(id, payload) {
    if (!id || !api.googleTasksUpdateTask || !api.getTodoGoogleTaskId) return Promise.resolve(false);
    return Promise.all([getGoogleTasksToken(), api.getTodoGoogleTaskId(id)]).then(function (values) {
      var token = values[0];
      var taskId = values[1];
      if (!token) return false;
      if (!taskId) return syncGoogleTaskAfterAdd(id, payload);
      return api.googleTasksUpdateTask(token, taskId, buildGoogleTaskFromLocal(id, payload)).then(function (updated) {
        if (updated && updated.error) console.warn("google task update failed", updated.error);
        return !!(updated && !updated.error);
      });
    }).catch(function (error) {
      console.warn("google task update failed", error);
      return false;
    });
  }

  function syncGoogleTaskStatus(id, isDone) {
    if (!id || !api.googleTasksSetStatus || !api.getTodoGoogleTaskId) return Promise.resolve(false);
    return Promise.all([getGoogleTasksToken(), api.getTodoGoogleTaskId(id)]).then(function (values) {
      var token = values[0];
      var taskId = values[1];
      if (!token || !taskId) return false;
      return api.googleTasksSetStatus(token, taskId, !!isDone).then(function (updated) {
        if (updated && updated.error) console.warn("google task status failed", updated.error);
        return !!(updated && !updated.error);
      });
    }).catch(function (error) {
      console.warn("google task status failed", error);
      return false;
    });
  }

  function deleteGoogleTaskForTodo(id) {
    if (!id || !api.googleTasksDeleteTask || !api.getTodoGoogleTaskId) return Promise.resolve(false);
    return Promise.all([getGoogleTasksToken(), api.getTodoGoogleTaskId(id)]).then(function (values) {
      var token = values[0];
      var taskId = values[1];
      if (!token || !taskId) return false;
      return api.googleTasksDeleteTask(token, taskId).then(function (deleted) {
        if (deleted && deleted.error) console.warn("google task delete failed", deleted.error);
        return !!(deleted && !deleted.error);
      });
    }).catch(function (error) {
      console.warn("google task delete failed", error);
      return false;
    });
  }

  // ── Google Tasks 양방향 동기화 ───────────────────────────────────────────────
  var _gtasksSyncing = false;

  function syncWithGoogleTasks() {
    if (_gtasksSyncing) return Promise.resolve({ skipped: true });
    if (!api.googleTasksListTasks) return Promise.resolve({ skipped: true });
    _gtasksSyncing = true;

    return getGoogleTasksToken().then(function (token) {
      if (!token) { _gtasksSyncing = false; return { skipped: true }; }

      return api.googleTasksListTasks(token).then(function (remote) {
        if (!remote || remote.error) { _gtasksSyncing = false; return { skipped: true }; }

        // 삭제된 항목 제외
        var remoteItems = (remote.items || []).filter(function (t) { return !t.deleted; });
        var remoteMap = {};
        remoteItems.forEach(function (t) { remoteMap[t.id] = t; });

        return api.getTodos(true).then(function (localTodos) {
          var localByGTaskId = {};
          localTodos.forEach(function (todo) {
            if (todo.google_task_id) localByGTaskId[todo.google_task_id] = todo;
          });

          var ops = [];

          // ── Phase 1: 원격 → 로컬 (새 항목 추가 / 변경 항목 업데이트) ───
          remoteItems.forEach(function (rt) {
            var remoteTitle    = (rt.title || '').trim() || '(제목 없음)';
            var remoteDone     = rt.status === 'completed';
            var remoteDeadline = rt.due ? rt.due.slice(0, 10) : '';
            var remoteUpdated  = rt.updated || '';

            var lt = localByGTaskId[rt.id];
            if (lt) {
              // 이미 로컬에 있음 — 원격 updated가 로컬 updated_at보다 최신이면 덮어씀
              var localTs = lt.updated_at || lt.created_at || '';
              // Google Tasks는 UTC ISO8601, DB는 'YYYY-MM-DD HH:MM:SS' (UTC)
              // 문자열 대소비교로 충분 (ISO8601 ↔ SQLite datetime 모두 사전순 = 시간순)
              var remoteIsNewer = !localTs || (remoteUpdated && remoteUpdated > localTs.replace(' ', 'T') + 'Z');
              if (remoteIsNewer) {
                if (lt.title !== remoteTitle || lt.deadline !== remoteDeadline) {
                  ops.push(
                    originalUpdateTodo(lt.id, {
                      title: remoteTitle,
                      deadline: remoteDeadline,
                      priority: lt.priority || '보통',
                      category: lt.category || '기타'
                    })
                  );
                }
                if ((!!lt.is_done) !== remoteDone) {
                  ops.push(originalToggleTodo(lt.id));
                }
              }
            } else {
              // 로컬에 없음 — 원격에서 새로 추가
              ops.push(
                originalAddTodo({
                  title: remoteTitle,
                  deadline: remoteDeadline,
                  priority: '보통',
                  category: '기타',
                  is_ai_generated: 0,
                  source_text: ''
                }).then(function (newId) {
                  if (!newId) return;
                  var p1 = originalSetTodoGoogleTaskId
                    ? originalSetTodoGoogleTaskId(newId, rt.id)
                    : Promise.resolve();
                  // 완료 상태도 반영
                  var p2 = remoteDone ? originalToggleTodo(newId) : Promise.resolve();
                  return Promise.all([p1, p2]);
                })
              );
            }
          });

          // ── Phase 2: 원격에서 삭제된 항목 → 로컬에서도 삭제 ────────────
          localTodos.forEach(function (lt) {

  function scoreSearchResult(query, item) {
    var q = normalizeSearchText(query);
    var title = normalizeSearchText(item.title);
    var text = normalizeSearchText(item.text + " " + item.desc);
    if (!q) return 0;
    if (title === q) return 100;
    if (title.indexOf(q) >= 0) return 85;
    if (text.indexOf(q) >= 0) return 65;

    var score = 0;
    var pos = 0;
    for (var i = 0; i < q.length; i += 1) {
      var found = text.indexOf(q[i], pos);
      if (found < 0) return 0;
      score += Math.max(2, 8 - Math.min(6, found - pos));
      pos = found + 1;
    }
    return score;
  }

    return getUserDoc(authUser.uid).collection("settings").doc("app").get().then(function (snap) {
      if (!snap.exists) return false;
      var data = snap.data() || {};
      var payload = buildCloudSettingsPayload(data);
      var keys = Object.keys(payload);
      return keys.reduce(function (chain, key) {
        return chain.then(function () {
          return originalSetSetting(key, payload[key]);
        });
      }, Promise.resolve()).then(function () {
        if (window.reloadTopNavigation && payload.menu_groups_config !== undefined) {
          return Promise.resolve(window.reloadTopNavigation()).then(function () {
            return payload;
          });
        }
        return payload;
      }).then(function (savedPayload) {
        if (window.updateClassInfo && (
          savedPayload.class_year !== undefined ||
          savedPayload.class_num !== undefined ||
          savedPayload.teacher_name !== undefined
        )) {
          return Promise.resolve(window.updateClassInfo()).then(function () {
            return savedPayload;
          });
        }
        return savedPayload;
      }).then(function () {
        if (window.__pages && window.__pages.dashboard && window.__pages.dashboard.refresh) {
          return Promise.resolve(window.__pages.dashboard.refresh()).then(function () {
            return true;
          });
        }
        return true;
      });
    });
  };

  function applyCloudSettingsPayload(data) {
    var payload = buildCloudSettingsPayload(data || {});
    var keys = Object.keys(payload);
    if (!keys.length) return Promise.resolve(false);

    return withRemoteApply(function () {
      return keys.reduce(function (chain, key) {
        return chain.then(function () {
          return originalSetSetting(key, payload[key]);
        });
      }, Promise.resolve());
    }).then(function () {
      if (payload.dashboard_layout_v4 !== undefined) {
        localStorage.setItem("dashboard_layout_v4", String(payload.dashboard_layout_v4 || ""));
        localStorage.setItem("dashLayout2", String(payload.dashboard_layout_v4 || ""));
      }
      var tasks = [];
      if (window.reloadTopNavigation) tasks.push(Promise.resolve(window.reloadTopNavigation()));
      if (window.updateClassInfo) tasks.push(Promise.resolve(window.updateClassInfo()));
      if (window.__pages && window.__pages.dashboard && window.__pages.dashboard.refresh) {
        tasks.push(Promise.resolve(window.__pages.dashboard.refresh()));
      }
      tasks.push(refreshCurrentPage());
      return Promise.all(tasks).then(function () {
        return true;
      });
    });
  }

  function sanitizeTodoForCloud(todo) {
    return {
      id: Number(todo.id) || 0,
      title: String(todo.title || ""),
      deadline: String(todo.deadline || ""),
      priority: String(todo.priority || "보통"),
      category: String(todo.category || "기타"),
      is_done: !!todo.is_done,
      is_ai_generated: !!todo.is_ai_generated,
      source_text: String(todo.source_text || ""),
      created_at: String(todo.created_at || ""),
      gcal_event_id: String(todo.gcal_event_id || "")
    };
  }

  function sanitizeTimetableForCloud(item) {
    return {
      day_of_week: Number(item.day_of_week) || 0,
      period: Number(item.period) || 0,
      subject: String(item.subject || ""),
      teacher: String(item.teacher || ""),
      room: String(item.room || ""),
      is_my_class: !!item.is_my_class
    };
  }

  function refreshSharedPages() {
    var tasks = [];
    if (window.updateClassInfo) tasks.push(Promise.resolve(window.updateClassInfo()));
    if (window.reloadTopNavigation) tasks.push(Promise.resolve(window.reloadTopNavigation()));
    if (window.__pages && window.__pages.dashboard && window.__pages.dashboard.refresh) {
      tasks.push(Promise.resolve(window.__pages.dashboard.refresh()));
    }
    if (window.__pages && window.__pages.todos && window.__pages.todos.refresh) {
      tasks.push(Promise.resolve(window.__pages.todos.refresh()));
    }
    if (window.__pages && window.__pages.timetable && window.__pages.timetable.init) {
      tasks.push(Promise.resolve(window.__pages.timetable.init()));
    }
    return Promise.all(tasks).catch(function () {});
  }

  function refreshCurrentPage() {
    if (!currentPage || !window.navigateTo) return Promise.resolve();
    if (currentPage === "dashboard") {
      if (window.__pages && window.__pages.dashboard && window.__pages.dashboard.refresh) {
        return Promise.resolve(window.__pages.dashboard.refresh()).catch(function () {});
      }
      return Promise.resolve();
    }
    return Promise.resolve(window.navigateTo(currentPage)).catch(function () {});
  }

  window.syncCloudSharedNow = function (kind) {
    ensureFirebase();
    if (!authUser || !authProfile || authProfile.active === false) {
      return Promise.resolve(false);
    }

    var tasks = [];
    if (!kind || kind === "timetable") {
      tasks.push(api.getTimetable().then(function (items) {
        return getSharedCollectionDoc("timetable").set({
          items: (items || []).map(sanitizeTimetableForCloud),
          updatedAt: window.firebase.firestore.FieldValue.serverTimestamp(),
          updatedBy: normalizeEmail(authUser.email)
        }, { merge: true });
      }));
    }

    if (!tasks.length) return Promise.resolve(false);

    return Promise.all(tasks).then(function () {
      return true;
    });
  };

  window.pullCloudSharedNow = function () {
    ensureFirebase();
    if (!authUser || !authProfile || authProfile.active === false) {
      return Promise.resolve(false);
    }
    return Promise.all([
      getSharedCollectionDoc("timetable").get()
    ]).then(function (snapshots) {
      var timetableSnap = snapshots[0];
      var tasks = [];

      return withRemoteApply(function () {
        if (timetableSnap.exists) {
          var timetableData = timetableSnap.data() || {};
          tasks.push(api.replaceTimetable(Array.isArray(timetableData.items) ? timetableData.items : []));
        }

        return Promise.all(tasks);
      }).then(function () {
        return refreshSharedPages().then(function () {
          return tasks.length > 0;
        });
      });
    });
  };

  function applyCloudSharedItems(todoItems, timetableItems) {
    var tasks = [];
    return withRemoteApply(function () {
      if (Array.isArray(timetableItems)) tasks.push(api.replaceTimetable(timetableItems));
      return Promise.all(tasks);
    }).then(function () {
      return refreshSharedPages().then(function () {
        return refreshCurrentPage();
      }).then(function () {
        return tasks.length > 0;
      });
    });
  }

  window.syncCloudSettingsNow = function () {
    ensureFirebase();
    if (!authUser || !authProfile || authProfile.active === false) {
      return Promise.resolve(false);
    }
    return purgeCloudSensitiveData().then(function () {
      return api.getAllSettings();
    }).then(function (settings) {
      var payload = buildCloudSettingsPayload(settings || {});
      payload.updatedAt = window.firebase.firestore.FieldValue.serverTimestamp();
      payload.updatedBy = normalizeEmail(authUser.email);
      return getUserDoc(authUser.uid).collection("settings").doc("app").set(payload, { merge: true }).then(function () {
        return true;
      });
    });
  };

  function pushCloudSettingNow(key, value) {
    if (!canSyncKey(key)) return Promise.resolve(false);
    if (!authUser || !authProfile || authProfile.active === false) return Promise.resolve(false);

    var payload = {};
    payload[key] = String(value);
    payload.updatedAt = window.firebase.firestore.FieldValue.serverTimestamp();
    payload.updatedBy = normalizeEmail(authUser.email);

    return getUserDoc(authUser.uid).collection("settings").doc("app")
      .set(payload, { merge: true })
      .catch(function (error) {
        console.error("cloud setting push failed", key, error);
        return false;
      });
  }

  function pushCloudSharedNow(kind) {
    if (!authUser || !authProfile || authProfile.active === false) return Promise.resolve(false);
    if (kind === "todos") return Promise.resolve(false);
    if (kind === "timetable") {
      sharedLocalWriteUntil[kind] = Date.now() + 3000;
    }
    return window.syncCloudSharedNow(kind).catch(function (error) {
      console.error((kind || "shared") + " cloud push failed", error);
      return false;
    });
  }

  window.syncCloudNow = function () {
    return Promise.all([
      window.syncCloudSettingsNow(),
      window.syncCloudSharedNow()
    ]).then(function (results) {
      return results.some(function (item) { return !!item; });
    });
  };

  window.pullCloudNow = function () {
    return Promise.all([
      window.pullCloudSettingsNow(),
      window.pullCloudSharedNow()
    ]).then(function (results) {
      return results.some(function (item) { return !!item; });
    });
  };

  function startCloudSubscriptions() {
    ensureFirebase();
    clearCloudSubscriptions();
    if (!authUser || !authProfile || authProfile.active === false) return;
    purgeCloudSensitiveData();

    cloudSubscriptions.push(
      getUserDoc(authUser.uid).collection("settings").doc("app").onSnapshot(function (snap) {
        if (!snap.exists) return;
        if (snap.metadata && snap.metadata.hasPendingWrites) return;
        applyCloudSettingsPayload(snap.data() || {}).catch(function (error) {
          console.error("cloud settings subscribe failed", error);
        });
      }, function (error) {
        console.error("cloud settings snapshot failed", error);
      })
    );

    cloudSubscriptions.push(
      getSharedCollectionDoc("timetable").onSnapshot(function (snap) {
        if (!snap.exists) return;
        if (snap.metadata && snap.metadata.hasPendingWrites) return;
        if (Date.now() < sharedLocalWriteUntil.timetable) return;
        var timetableData = snap.data() || {};
        applyCloudSharedItems(null, Array.isArray(timetableData.items) ? timetableData.items : []).catch(function (error) {
          console.error("cloud timetable subscribe failed", error);
        });
      }, function (error) {
        console.error("cloud timetable snapshot failed", error);
      })
    );
  }

  function queueCloudSync(key) {
    if (!canSyncKey(key)) return;
    if (!authUser || !authProfile || authProfile.active === false) return;
    api.getSetting(key, "").then(function (value) {
      return pushCloudSettingNow(key, value);
    }).catch(function (error) {
      console.error("cloud sync failed", error);
    });
  }

  function queueSharedCollectionSync(kind) {
    if (!authUser || !authProfile || authProfile.active === false) return;
    pushCloudSharedNow(kind);
  }

  function createOrUpdateUserProfile(user, displayName) {
    ensureFirebase();
    var docRef = getUserDoc(user.uid);
    return docRef.get().then(function (snap) {
      var baseData = snap.exists ? (snap.data() || {}) : null;
      if (baseData) {
        return docRef.set({
          email: normalizeEmail(user.email),
          displayName: displayName || baseData.displayName || "",
          lastLoginAt: window.firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true }).then(function () {
          return docRef.get();
        });
      }
      return docRef.set({
        email: normalizeEmail(user.email),
        displayName: displayName || "",
        approved: true,
        active: true,
        gradeAccess: false,
        role: "user",
        createdAt: window.firebase.firestore.FieldValue.serverTimestamp(),
        lastLoginAt: window.firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true }).then(function () {
        return docRef.get();
      });
    }).then(function (nextSnap) {
      authProfile = nextSnap.exists ? nextSnap.data() : null;
      return authProfile;
    });
  }

  function evaluateAuthenticatedUser(user) {
    var previousAuthUser = authUser;
    authUser = user || null;
    if (!user) {
      if (previousAuthUser && previousAuthUser.uid) setLastLocalAuthUid(previousAuthUser.uid);
      clearCloudSubscriptions();
      clearSessionWatch();
      authProfile = null;
      renderAuthOverlay("form", authPendingMessage, "");
      authPendingMessage = "";
      return Promise.resolve(false);
    }
    return createOrUpdateUserProfile(user, "").then(function (profile) {
      authProfile = profile || {};
      if (authProfile.deleted === true) {
        renderAuthOverlay("blocked", "이 계정은 관리자에 의해 삭제되어 사용할 수 없습니다.", normalizeEmail(user.email));
        return false;
      }
      if (authProfile.active === false) {
        renderAuthOverlay("blocked", "", normalizeEmail(user.email));
        return false;
      }
      return claimLoginSession(user).catch(function (error) {
        console.error("login session claim failed", error);
        authPendingMessage = formatLoginSessionError(error);
        return firebaseAuth.signOut().then(function () {
          return false;
        });
      }).then(function (sessionOk) {
        if (!sessionOk) return false;
        var previousLocalUid = getLastLocalAuthUid();
        var shouldMigrateLegacyDb = !previousLocalUid || previousLocalUid === user.uid;
        return Promise.resolve(api.switchUserDatabase ? api.switchUserDatabase(user.uid, { migrateLegacy: shouldMigrateLegacyDb }) : null).then(function () {
          if (api.switchUserDatabase) return true;
          return clearSyncedLocalDataForAccountSwitch(user.uid).catch(function (error) {
            console.error("account switch local clear failed", error);
            return false;
          });
        }).then(function () {
          return window.pullCloudSettingsNow().catch(function () {
            return false;
          });
        }).then(function () {
          return window.pullCloudSharedNow().catch(function () {
            return false;
          });
        }).then(function () {
          setLastLocalAuthUid(user.uid);
          return true;
        }).catch(function () {
          return false;
        }).then(function () {
          startCloudSubscriptions();
          startSessionWatch(user);
          closeAuthOverlay();
          return true;
        });
      }).catch(function (error) {
        console.error("login failed", error);
        renderAuthOverlay("form", "로그인 세션을 확인하지 못했습니다. 잠시 후 다시 시도해 주세요.", normalizeEmail(user.email));
        return false;
      });
    });
  }

  function initAuthGate() {
    ensureFirebase();
    return new Promise(function (resolve, reject) {
      firebaseAuth.onAuthStateChanged(function (user) {
        evaluateAuthenticatedUser(user).then(function (ok) {
          if (ok && !authBootResolved) {
            authBootResolved = true;
            resolve();
          }
        }).catch(function (error) {
          console.error(error);
          renderAuthOverlay("form", parseFirebaseError(error, "로그인 준비 중 문제가 발생했습니다."), "");
          if (!authBootResolved) {
            reject(error);
          }
        });
      });
    });
  }

  function updateUpdateButton(state) {
    var btn = document.getElementById("update-btn");
    if (!btn) return;
    var next = state || {};
    btn.disabled = false;
    btn.classList.remove("active");

    if (next.status === "dev") {
      btn.style.display = "";
      btn.textContent = "개발 실행";
      btn.disabled = true;
      btn.title = next.message || "개발 실행에서는 자동 업데이트를 확인하지 않습니다.";
      return;
    }
    if (next.status === "checking") {
      btn.style.display = "";
      btn.textContent = "업데이트 확인 중";
      btn.disabled = true;
      btn.title = next.message || "";
      return;
    }
    if (next.status === "available") {
      btn.style.display = "";
      btn.textContent = "업데이트 다운로드";
      btn.classList.add("active");
      btn.title = next.message || "";
      return;
    }
    if (next.status === "downloading") {
      btn.style.display = "";
      btn.textContent = "다운로드 " + Math.round(next.progress || 0) + "%";
      btn.disabled = true;
      btn.title = next.message || "";
      return;
    }
    if (next.status === "downloaded") {
      btn.style.display = "";
      btn.textContent = "재시작 후 설치";
      btn.classList.add("active");
      btn.title = next.message || "";
      return;
    }
    if (next.status === "error") {
      btn.style.display = "";
      btn.textContent = "업데이트 오류";
      btn.title = next.message || "";
      return;
    }
    btn.style.display = "";
    btn.textContent = "업데이트 확인";
    btn.title = next.message || "최신 버전을 확인합니다.";
  }

  function initUpdateButton() {
    var btn = document.getElementById("update-btn");
    if (!btn || !api.getUpdateStatus) return;

    btn.addEventListener("click", function () {
      api.getUpdateStatus().then(function (state) {
        if (state.status === "available") {
          return api.downloadUpdate();
        }
        if (state.status === "downloaded") {
          return api.quitAndInstallUpdate();
        }
        return api.checkForUpdates();
      }).catch(function (error) {
        toast(error.message || "업데이트 확인에 실패했습니다.", "error");
      });
    });

    api.onUpdateStatus(function (state) {
      updateUpdateButton(state);
      if (state.status === "available") {
        toast(state.message || "새 업데이트가 있습니다.", "success", 3500);
      } else if (state.status === "downloaded") {
        toast("업데이트 다운로드가 완료되었습니다. 버튼을 눌러 설치할 수 있습니다.", "success", 4500);
      } else if (state.status === "error") {
        toast(state.message || "업데이트 확인 중 문제가 발생했습니다.", "warning", 4000);
      }
    });

    api.getUpdateStatus().then(updateUpdateButton).catch(function () {
      updateUpdateButton({ status: "idle" });
    });
  }

  function syncActiveTabs() {
    var homeBtn = document.getElementById("home-btn");
    if (homeBtn) homeBtn.classList.toggle("active", currentPage === "dashboard");

    document.querySelectorAll(".tab-link").forEach(function (button) {
      button.classList.toggle("active", button.getAttribute("data-key") === currentPage);
    });

    document.querySelectorAll(".tab-group").forEach(function (groupEl) {
      var groupKey = groupEl.getAttribute("data-group-key");
      var group = menuGroups.find(function (entry) { return entry.key === groupKey; });
      if (!group) return;

      var currentItemKey = group.items.find(function (itemKey) { return itemKey === currentPage; });
      var currentItem = currentItemKey ? findMenuPage(currentItemKey) : null;
      var valueEl = groupEl.querySelector(".tab-group-value");
      if (valueEl) {
        valueEl.textContent = currentItem ? currentItem.label : (group.items[0] ? findMenuPage(group.items[0]).label : "");
      }
      groupEl.classList.toggle("open", openGroupKey === groupKey);
      groupEl.classList.toggle("selected", !!currentItem);
    });
  }

  function buildTopTabs() {
    var nav = document.getElementById("page-tabs");
    nav.innerHTML = "";

    menuGroups.forEach(function (group) {
      if (!group.items.length) return;

      var section = document.createElement("section");
      section.className = "tab-group";
      section.setAttribute("data-group-key", group.key);
      section.addEventListener("mouseenter", function () {
        if (closeGroupTimer) {
          clearTimeout(closeGroupTimer);
          closeGroupTimer = null;
        }
        openGroupKey = group.key;
        positionTabDropdown(section);
        syncActiveTabs();
      });
      section.addEventListener("mouseleave", function () {
        closeGroupTimer = setTimeout(function () {
          if (openGroupKey === group.key) {
            openGroupKey = "";
            syncActiveTabs();
          }
        }, 140);
      });
      section.addEventListener("focusin", function () {
        openGroupKey = group.key;
        syncActiveTabs();
      });
      section.addEventListener("focusout", function () {
        setTimeout(function () {
          if (!section.contains(document.activeElement) && openGroupKey === group.key) {
            openGroupKey = "";
            syncActiveTabs();
          }
        }, 0);
      });

      var label = document.createElement("button");
      label.className = "tab-group-label";
      label.type = "button";

      var labelText = document.createElement("span");
      labelText.className = "tab-group-text";
      labelText.textContent = group.label;

      var labelValue = document.createElement("span");
      labelValue.className = "tab-group-value";
      labelValue.textContent = findMenuPage(group.items[0]).label;

      label.appendChild(labelText);
      label.appendChild(labelValue);
      label.addEventListener("click", function () {
        openGroupKey = openGroupKey === group.key ? "" : group.key;
        if (openGroupKey === group.key) positionTabDropdown(section);
        syncActiveTabs();
      });
      section.appendChild(label);

      var items = document.createElement("div");
      items.className = "tab-group-items";

      group.items.forEach(function (itemKey) {
        var item = findMenuPage(itemKey);
        if (!item) return;

        var button = document.createElement("button");
        button.className = "tab-link";
        button.type = "button";
        button.setAttribute("data-key", item.key);
        button.textContent = item.label;
        if (item.key === currentPage) button.classList.add("active");
        button.addEventListener("click", function () {
          openGroupKey = "";
          navigateTo(item.key);
        });
        items.appendChild(button);
      });

      section.appendChild(items);
      nav.appendChild(section);
    });

    syncActiveTabs();
  }

  function loadPage(key) {
    if (pageCache[key]) return Promise.resolve(pageCache[key]);
    return new Promise(function (resolve, reject) {
      if (window.__pages && window.__pages[key]) {
        pageCache[key] = window.__pages[key];
        resolve(window.__pages[key]);
        return;
      }

      window.__pageResolvers = window.__pageResolvers || {};
      window.__pageResolvers[key] = function (mod) {
        pageCache[key] = mod;
        resolve(mod);
      };

      var script = document.createElement("script");
      script.src = "pages/" + key + ".js";
      script.onerror = function () {
        reject(new Error("페이지를 불러올 수 없습니다: " + key));
      };
      document.head.appendChild(script);
    });
  }

  function initGlobalSearch() {
    var input = document.getElementById("global-search-input");
    var results = document.getElementById("global-search-results");
    if (!input || !results) return;

    var currentMatches = [];

    function hideResults() {
      results.style.display = "none";
      results.innerHTML = "";
    }

    function runSearchItem(item) {
      hideResults();
      input.value = "";
      input.blur();
      if (item.run) {
        item.run();
        return;
      }
      if (item.kind === "page" && item.key) navigateTo(item.key);
    }

    function renderResults() {
      var query = input.value.trim();
      if (!query) {
        hideResults();
        return;
      }

      currentMatches = getSearchCatalog()
        .map(function (item) {
          return Object.assign({}, item, { score: scoreSearchResult(query, item) });
        })
        .filter(function (item) { return item.score > 0; })
        .sort(function (a, b) { return b.score - a.score; })
        .slice(0, 8);

      var inputRect = input.getBoundingClientRect();
      results.style.top = (inputRect.bottom + 4) + "px";
      results.style.left = inputRect.left + "px";
      results.style.width = Math.max(inputRect.width, 280) + "px";

      if (!currentMatches.length) {
        results.innerHTML = '<div class="global-search-empty">관련 기능을 찾지 못했습니다.</div>';
        results.style.display = "block";
        return;
      }

      results.innerHTML = "";
      currentMatches.forEach(function (item, index) {
        var button = document.createElement("button");
        button.type = "button";
        button.className = "global-search-result" + (index === 0 ? " active" : "");
        button.innerHTML =
          '<span class="global-search-result-title"></span>' +
          '<span class="global-search-result-desc"></span>';
        button.querySelector(".global-search-result-title").textContent = item.title;
        button.querySelector(".global-search-result-desc").textContent = item.desc || "";
        button.addEventListener("click", function () {
          runSearchItem(item);
        });
        results.appendChild(button);
      });
      results.style.display = "block";
    }

    input.addEventListener("input", renderResults);
    input.addEventListener("focus", renderResults);
    input.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        hideResults();
        input.blur();
        return;
      }
      if (event.key === "Enter" && currentMatches[0]) {
        event.preventDefault();
        runSearchItem(currentMatches[0]);
      }
    });

    document.addEventListener("keydown", function (event) {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "k") {
        event.preventDefault();
        input.focus();
        input.select();
      }
    });

    document.addEventListener("click", function (event) {
      if (!document.getElementById("global-search").contains(event.target)) hideResults();
    });
  }

  }

  function addAiMessage(role, text) {
    var box = document.getElementById("ai-helper-messages");
    if (!box) return;
    var item = document.createElement("div");
    item.className = "ai-helper-msg " + role;
    item.innerHTML = "<div>" + escapeAiHtml(text).replace(/\n/g, "<br>") + "</div>";
    box.appendChild(item);
    box.scrollTop = box.scrollHeight;
  }

  function refreshAiHelperStatus() {
    var status = document.getElementById("ai-helper-status");
    if (!status) return Promise.resolve({});
    return api.getAllSettings().then(function (settings) {
      var engine = settings.ai_engine || "local_lite";
      if (engine === "local_lite") status.textContent = "Local AI Lite · 빠른 응답 · 학생/상담 기본 로컬 AI";
      else if (engine === "local_basic") status.textContent = "Local AI Basic · Gemma 4 E2B 권장 · 모델 연결 준비 중";
      else if (engine === "local_pro") status.textContent = "Local AI Pro · Gemma 4 E4B 권장 · 16GB RAM 이상 권장";
      else if (engine === "gemini") status.textContent = "Gemini 외부 AI · 입력 내용 외부 전송 가능 · 민감정보 주의";
      else if (engine === "claude" || engine === "cloud") status.textContent = "Claude 외부 AI · 입력 내용 외부 전송 가능 · 민감정보 주의";
      else status.textContent = "Local AI · 외부 전송 없음";
      return settings;
    });
  }

  function openAiHelper(seedPrompt) {
    var panel = document.getElementById("ai-helper-panel");
    var backdrop = document.getElementById("ai-helper-backdrop");
    if (!panel || !backdrop) return;
    panel.classList.add("open");
    backdrop.classList.add("open");
    panel.setAttribute("aria-hidden", "false");
    refreshAiHelperStatus().then(function () {
      var messages = document.getElementById("ai-helper-messages");
      if (messages && !messages.children.length) {
        addAiMessage("assistant", "저는 모든 페이지에서 열리는 AI 도우미입니다. 현재 페이지는 " + getCurrentPageLabel() + "입니다. 무엇을 도와드릴까요?");
      }
      if (seedPrompt) {
        var input = document.getElementById("ai-helper-input");
        if (input) input.value = seedPrompt;
      }
    });
  }

  function closeAiHelper() {
    var panel = document.getElementById("ai-helper-panel");
    var backdrop = document.getElementById("ai-helper-backdrop");
    if (panel) {
      panel.classList.remove("open");
      panel.setAttribute("aria-hidden", "true");
    }
    if (backdrop) backdrop.classList.remove("open");
  }

  var aiHelperInputComposing = false;

  function isAiHelperImeEnter(event) {
    return aiHelperInputComposing || event.isComposing;
  }

  function sendAiHelperMessage() {
    var input = document.getElementById("ai-helper-input");
    if (!input) return;
    var question = input.value.trim();
    if (!question) return;
    input.value = "";
    addAiMessage("user", question);
    addAiMessage("assistant", "생각하는 중...");
    var box = document.getElementById("ai-helper-messages");
    var pending = box ? box.lastElementChild : null;
    var pageContext = "";
    var manualContext = "";
    var directAnswer = "";
    try {
      if (isGreetingQuestion(question)) {
        directAnswer = buildAiHelperGreetingReply();
      }
      if (typeof window.appGetAiPageContext === "function") {
        pageContext = window.appGetAiPageContext(question) || "";
      }
      manualContext = buildManualAiContext(question);
    } catch (error) {
      pageContext = "";
      directAnswer = "";
    }
    if (directAnswer) {
      if (pending) pending.querySelector("div").innerHTML = escapeAiHtml(normalizeAiHelperAnswer(directAnswer)).replace(/\n/g, "<br>");
      return;
    }
    if (manualContext) {
      pageContext = [pageContext, manualContext].filter(Boolean).join("\n\n");
    }
    api.getAllSettings().then(function (settings) {
      var externalProvider = settings.ai_engine === "gemini" ? "gemini" : ((settings.ai_engine === "claude" || settings.ai_engine === "cloud") ? "claude" : "");
      var sensitivePage = /학생|상담|성적|출석|관찰|수업|AI 분석/.test(getCurrentPageLabel() || "") || currentPage === "counseling" || currentPage === "students" || currentPage === "grades" || currentPage === "ai_analysis";
      var localEngine = (settings.ai_engine === "local_lite" || settings.ai_engine === "local_basic" || settings.ai_engine === "local_pro") ? settings.ai_engine : "";
      if (sensitivePage && !localEngine) localEngine = "local_lite";
      if (localEngine && api.aiLocalChat) {
        return api.aiLocalChat({
          engine: localEngine,
          page: getCurrentPageLabel(),
          question: question,
          context: pageContext
        }).then(function (result) {
          return result && result.result ? result.result : buildRuleBasedAiReply(question, settings);
        }).catch(function () {
          return buildRuleBasedAiReply(question, settings);
        });
      }
      if (externalProvider && settings.ai_api_key && api.aiAssistantChat) {
        return api.aiAssistantChat({
          provider: externalProvider,
          model: settings.ai_model || "",
          apiKey: settings.ai_api_key,
          page: getCurrentPageLabel(),
          question: question,
          context: pageContext,
          sensitive: sensitivePage
        }).then(function (result) {
          return result && result.result ? result.result : buildRuleBasedAiReply(question, settings);
        }).catch(function () {
          return buildRuleBasedAiReply(question, settings);
        });
      }
      return buildRuleBasedAiReply(question, settings);
    }).then(function (answer) {
      if (pending) pending.querySelector("div").innerHTML = escapeAiHtml(normalizeAiHelperAnswer(answer)).replace(/\n/g, "<br>");
    });
  }

  function initAiHelper() {
    var openBtn = document.getElementById("ai-helper-btn");
    var closeBtn = document.getElementById("ai-helper-close");
    var backdrop = document.getElementById("ai-helper-backdrop");
    var sendBtn = document.getElementById("ai-helper-send");
    var manualPdfBtn = document.getElementById("ai-helper-manual-pdf");
    var input = document.getElementById("ai-helper-input");
    if (openBtn) openBtn.addEventListener("click", function () { openAiHelper(); });
    if (closeBtn) closeBtn.addEventListener("click", closeAiHelper);
    if (backdrop) backdrop.addEventListener("click", closeAiHelper);
    if (sendBtn) sendBtn.addEventListener("click", sendAiHelperMessage);
    if (manualPdfBtn) manualPdfBtn.addEventListener("click", exportManualPdf);
    if (input) {
      input.addEventListener("compositionstart", function () {
        aiHelperInputComposing = true;
      });
      input.addEventListener("compositionend", function () {
        aiHelperInputComposing = false;
      });
      input.addEventListener("keydown", function (event) {
        if (event.key === "Enter" && !event.shiftKey) {
          if (isAiHelperImeEnter(event)) return;
          event.preventDefault();
          sendAiHelperMessage();
        }
      });
    }
    document.querySelectorAll("[data-ai-prompt]").forEach(function (button) {
      button.addEventListener("click", function () {
        openAiHelper(button.getAttribute("data-ai-prompt"));
      });
    });
    window.openAiHelper = openAiHelper;
  }

  window.reloadTopNavigation = function () {
    return api.getSetting("menu_groups_config", "").then(function (raw) {
      menuGroups = parseMenuGroups(raw);
      menuItems = flattenMenuItems(menuGroups);
      buildTopTabs();
      syncActiveTabs();
    });
  };

  var toastContainer = document.createElement("div");
  toastContainer.id = "toast-container";
  document.body.appendChild(toastContainer);

  window.toast = function (msg, type, duration) {
    var actualType = type || "default";
    var actualDuration = duration || 2500;
    var el = document.createElement("div");
    el.className = "toast" + (actualType !== "default" ? " " + actualType : "");
    el.textContent = msg;
    toastContainer.appendChild(el);
    setTimeout(function () {
      el.style.opacity = "0";
      el.style.transition = "opacity .3s";
      setTimeout(function () {
        el.remove();
      }, 300);
    }, actualDuration);
  };

  window.showModal = function (html, onClose) {
    var overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = '<div class="modal">' + html + "</div>";
    overlay.addEventListener("click", function (event) {
      if (event.target === overlay) closeModal();
    });
    document.body.appendChild(overlay);

    var close = function () {
      overlay.remove();
      if (onClose) onClose();
    };

    window.__closeModal = close;
    overlay.querySelectorAll("[data-close]").forEach(function (button) {
      button.addEventListener("click", close);
    });
    return { close: close, el: overlay };
  };

  window.closeModal = function () {
    if (window.__closeModal) window.__closeModal();
  };

  window.today = function () {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };

  window.formatDate = function (str) {
    if (!str) return "";
    return str.replace(/-/g, ".");
  };

  window.diffDays = function (dateStr) {
    var now = new Date();
    now.setHours(0, 0, 0, 0);
    var target = new Date(dateStr);
    target.setHours(0, 0, 0, 0);
    return Math.round((target - now) / 86400000);
  };

  function getReleaseNoticeItems(version) {
    return [
      "할일 목록은 종료 시에도 로컬에 안전하게 저장되고, 인터넷이 있으면 클라우드에 동기화됩니다.",
      "대시보드 할일에서 완료 항목은 최근 5개만 보여 더 깔끔하게 정리됩니다.",
      "개인 시간표에서 같은 번호는 같은 색으로 표시할 수 있습니다.",
      "다른 컴퓨터에서 같은 계정으로 로그인할 때 기존 접속을 정리하는 기능이 추가되었습니다."
    ];
  }

  function showReleaseNoticeIfNeeded() {
    if (!api || !api.getAppMeta) return Promise.resolve(false);
    return Promise.all([
      api.getAppMeta(),
      window.appNoticeGet ? window.appNoticeGet().catch(function () { return null; }) : Promise.resolve(null)
    ]).then(function (results) {
      var meta = results[0];
      var remoteNotice = results[1];
      var version = String((meta && meta.version) || "dev");
      var noticeId = remoteNotice && remoteNotice.noticeId ? remoteNotice.noticeId : ("v" + version);
      var snoozeKey = "notice_snooze_until_" + noticeId;
      var readKey = "notice_read_" + noticeId;

      return Promise.all([
        api.getSetting(snoozeKey, ""),
        api.getSetting(readKey, "")
      ]).then(function (values) {
        var snoozeUntil = Number(values[0] || 0);
        var alreadyRead = values[1] === "true";
        if (alreadyRead || (snoozeUntil && Date.now() < snoozeUntil)) return false;

        var title = remoteNotice ? remoteNotice.title : "공지사항";
        var subtitle = remoteNotice && remoteNotice.version
          ? "버전 " + remoteNotice.version + " 업데이트 안내입니다."
          : "버전 " + version + " 업데이트 안내입니다.";
        var bodyHtml = "";
        if (remoteNotice && remoteNotice.body) {
          bodyHtml = String(remoteNotice.body).split(/\r?\n/).filter(function (line) {
            return line.trim();
          }).map(function (line) {
            return '<div style="line-height:1.55;margin:6px 0">' + line.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") + '</div>';
          }).join("");
        } else {
          var items = getReleaseNoticeItems(version);
          bodyHtml = '<ul style="margin:0;padding-left:20px;color:var(--text)">' + items.map(function (item) {
            return '<li style="margin:8px 0;line-height:1.45">' + item + '</li>';
          }).join("") + '</ul>';
        }

        showModal(
          '<div class="modal-header">' +
            '<span class="modal-title">' + title.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") + '</span>' +
            '<button class="modal-close" data-close>×</button>' +
          '</div>' +
          '<div class="modal-body" style="display:grid;gap:14px">' +
            '<div style="font-size:13px;color:var(--text2)">' + subtitle + '</div>' +
            '<div style="color:var(--text)">' + bodyHtml + '</div>' +
            '<div style="font-size:12px;color:var(--text3)">업데이트 후 달라진 기능을 이해하기 쉽게 알려드리는 공지입니다.</div>' +
          '</div>' +
          '<div class="modal-footer">' +
            '<button class="btn btn-secondary" id="notice-snooze-week">일주일 간 보지 않기</button>' +
            '<button class="btn btn-primary" id="notice-ok">확인</button>' +
          '</div>'
        );

        setTimeout(function () {
          var snoozeButton = document.getElementById("notice-snooze-week");
          var okButton = document.getElementById("notice-ok");
          if (snoozeButton) {
            snoozeButton.onclick = function () {
              api.setSetting(snoozeKey, String(Date.now() + 7 * 24 * 60 * 60 * 1000)).finally(function () {
                closeModal();
              });
            };
          }
          if (okButton) {
            okButton.onclick = function () {
              api.setSetting(readKey, "true").finally(function () {
                closeModal();
              });
            };
          }
        }, 0);

        return true;
      });
    }).catch(function (error) {
      console.error("release notice failed", error);
      return false;
    });
  }

  Promise.resolve()
    .then(function () {
      initWindowButtons();
      initGlobalSearch();
      initHomeButton();
      initUpdateButton();
      initManualButton();
      initWidgetButton();
      initEditButton();
      initOpacityPanel();
      initAiSettingsPanel();
      initAiHelper();
      updateDate();
      setInterval(updateDate, 60000);
      return initAuthGate();
    })
    .then(function () {
      return window.reloadTopNavigation();
    })
    .then(function () {
      return updateClassInfo();
    })
    .then(function () {
      return navigateTo("dashboard");
    })
    .then(function () {
      setTimeout(showReleaseNoticeIfNeeded, 600);
    })
    .catch(function (error) {
      document.getElementById("page-tabs").innerHTML =
        '<div style="padding:12px 18px;color:#d14343;font-weight:600">탭을 불러오지 못했습니다.</div>';
      showError(error.message);
      console.error(error);
    });
})();
</script>
</body>
</html>
