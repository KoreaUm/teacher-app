<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교사 업무 관리</title>
<link rel="stylesheet" href="styles.css">
<script src="../node_modules/firebase/firebase-app-compat.js"></script>
<script src="../node_modules/firebase/firebase-auth-compat.js"></script>
<script src="../node_modules/firebase/firebase-firestore-compat.js"></script>
<script src="firebase/config.js"></script>
</head>
<body>
<div id="titlebar">
  <div id="titlebar-drag">
    <span id="app-title">교사 업무 관리</span>
  </div>
  <div id="titlebar-btns">
    <button id="min-btn" title="최소화">─</button>
    <button id="max-btn" title="최대화">▢</button>
    <button id="close-btn" title="닫기">✕</button>
  </div>
</div>

<div id="app-layout">
  <div id="content-wrap">
    <header id="topbar">
      <div id="topbar-left">
        <button id="home-btn" class="topbar-btn home-btn" title="홈 대시보드">🏠</button>
        <span id="class-info">--학년 --반 · --교사</span>
        <div class="vdiv"></div>
        <div id="global-search" class="global-search">
          <input id="global-search-input" class="global-search-input" placeholder="기능 검색... 예: 출석, 급식, 공지" autocomplete="off">
          <div id="global-search-results" class="global-search-results" style="display:none"></div>
        </div>
        <nav id="page-tabs"></nav>
      </div>
      <div id="topbar-right">
        <button id="update-btn" class="topbar-btn" style="display:none">업데이트 확인</button>
        <button id="edit-layout-btn" class="topbar-btn" style="display:none">배열 편집</button>
        <button id="widget-mode-btn" class="topbar-btn" style="display:none">위젯 모드</button>
        <div style="position:relative">
          <button id="opacity-btn" class="topbar-btn" title="투명도 조절">투명도</button>
          <div id="opacity-panel" style="display:none;position:absolute;right:0;top:38px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;box-shadow:var(--shadow-md);z-index:9999;align-items:center;gap:10px;white-space:nowrap;min-width:220px">
            <span style="font-size:12px;color:var(--text2)">투명도</span>
            <input id="opacity-slider" type="range" min="20" max="100" value="100" style="flex:1;accent-color:var(--accent)">
            <span id="opacity-lbl" style="font-size:12px;font-weight:600;color:var(--accent);width:34px;text-align:right">100%</span>
          </div>
        </div>
        <div class="vdiv"></div>
        <span id="header-date"></span>
      </div>
    </header>

    <main id="page-content"></main>
  </div>
</div>

<script>
(function () {
  var api = window.api;
  var pageCache = {};
  var currentPage = "dashboard";
  var openGroupKey = "";
  var closeGroupTimer = null;
  var widgetMode = false;
  var firebaseApp = null;
  var firebaseAuth = null;
  var firebaseDb = null;
  var authUser = null;
  var authProfile = null;
  var authOverlayEl = null;
  var authScreenMode = "login";
  var authPendingMessage = "";
  var authBootResolved = false;
  var cloudSyncTimer = null;
  var sharedSyncTimer = null;
  var cloudSubscriptions = [];
  var sessionUnsubscribe = null;
  var sessionHeartbeatTimer = null;
  var sessionTakeoverInProgress = false;
  var sharedLocalWriteUntil = {
    todos: 0,
    timetable: 0
  };
  var remoteApplyDepth = 0;
  var originalSetSetting = api.setSetting.bind(api);
  var CLOUD_SYNC_KEYS = [
    "class_year",
    "class_num",
    "teacher_name",
    "weather_region",
    "edu_office_code",
    "school_code",
    "menu_groups_config",
    "quick_links_config",
    "dashboard_layout_v4",
    "hidden_widgets",
    "class_timetable_subject_colors",
    "class_timetable_json",
    "class_timetable_file_name",
    "teacher_timetable_number_colors_enabled",
    "teacher_timetable_number_colors",
    "custom_calendar_events",
    "gcal_client_id",
    "gcal_client_secret",
    "gcal_refresh_token",
    "todo_manual_order"
  ];

  api.setSetting = function (key, value) {
    return Promise.resolve(originalSetSetting(key, value)).then(function (result) {
      if (!isApplyingRemoteData()) pushCloudSettingNow(key, value);
      return result;
    });
  };
  var originalAddTodo = api.addTodo.bind(api);
  var originalUpdateTodo = api.updateTodo.bind(api);
  var originalToggleTodo = api.toggleTodo.bind(api);
  var originalDeleteTodo = api.deleteTodo.bind(api);
  var originalSetTodoGcalId = api.setTodoGcalId.bind(api);
  var originalSetTimetableCell = api.setTimetableCell.bind(api);
  var originalClearTimetable = api.clearTimetable.bind(api);
  var originalReplaceTimetable = api.replaceTimetable ? api.replaceTimetable.bind(api) : null;

  api.addTodo = function (payload) {
    return Promise.resolve(originalAddTodo(payload)).then(function (result) {
      if (!isApplyingRemoteData()) pushCloudSharedNow("todos");
      return result;
    });
  };
  api.updateTodo = function (id, payload) {
    return Promise.resolve(originalUpdateTodo(id, payload)).then(function (result) {
      if (!isApplyingRemoteData()) pushCloudSharedNow("todos");
      return result;
    });
  };
  api.toggleTodo = function (id) {
    return Promise.resolve(originalToggleTodo(id)).then(function (result) {
      if (!isApplyingRemoteData()) pushCloudSharedNow("todos");
      return result;
    });
  };
  api.deleteTodo = function (id) {
    return Promise.resolve(originalDeleteTodo(id)).then(function (result) {
      if (!isApplyingRemoteData()) pushCloudSharedNow("todos");
      return result;
    });
  };
  api.setTodoGcalId = function (id, gcalId) {
    return Promise.resolve(originalSetTodoGcalId(id, gcalId)).then(function (result) {
      if (!isApplyingRemoteData()) pushCloudSharedNow("todos");
      return result;
    });
  };
  api.setTimetableCell = function (payload) {
    return Promise.resolve(originalSetTimetableCell(payload)).then(function (result) {
      if (!isApplyingRemoteData()) pushCloudSharedNow("timetable");
      return result;
    });
  };
  api.clearTimetable = function () {
    return Promise.resolve(originalClearTimetable()).then(function (result) {
      if (!isApplyingRemoteData()) pushCloudSharedNow("timetable");
      return result;
    });
  };
  if (originalReplaceTimetable) {
    api.replaceTimetable = function (items) {
      return Promise.resolve(originalReplaceTimetable(items)).then(function (result) {
        if (!isApplyingRemoteData()) pushCloudSharedNow("timetable");
        return result;
      });
    };
  }

  var MENU_PAGE_OPTIONS = [
    { key: "students", label: "학생 명단" },
    { key: "attendance", label: "출석 관리" },
    { key: "daily_memo", label: "학급 메모" },
    { key: "timetable", label: "시간표 관리" },
    { key: "counseling", label: "상담 일지" },
    { key: "observations", label: "관찰 기록" },
    { key: "lessons", label: "수업 지도" },
    { key: "assessments", label: "수행평가" },
    { key: "submissions", label: "제출물 관리" },
    { key: "statistics", label: "통계와 출력" },
    { key: "ai_analysis", label: "AI 분석" },
    { key: "meal", label: "급식 메뉴" },
    { key: "school_calendar", label: "학사 일정" },
    { key: "calculator", label: "계산기" },
    { key: "todos", label: "할일 목록" },
    { key: "settings", label: "설정" }
  ];
  var ADMIN_MENU_PAGE = { key: "user_management", label: "회원 관리" };

  var DEFAULT_MENU_GROUPS = [
    { key: "class", label: "학급 관리", items: ["students", "attendance", "daily_memo", "timetable"] },
    { key: "records", label: "기록", items: ["counseling", "observations", "lessons"] },
    { key: "evaluation", label: "평가", items: ["assessments", "submissions", "statistics", "ai_analysis"] },
    { key: "tools", label: "도구", items: ["meal", "school_calendar", "calculator", "settings"] }
  ];

  var menuGroups = cloneMenuGroups(DEFAULT_MENU_GROUPS);
  var menuItems = flattenMenuItems(menuGroups);

  window.__pages = window.__pages || {};
  window.registerPage = function (key, mod) {
    window.__pages[key] = mod;
    pageCache[key] = mod;
    if (window.__pageResolvers && window.__pageResolvers[key]) {
      window.__pageResolvers[key](mod);
      delete window.__pageResolvers[key];
    }
  };

  function cloneMenuGroups(groups) {
    return groups.map(function (group, index) {
      return {
        key: group.key || ("group_" + index),
        label: group.label || ("범주 " + (index + 1)),
        items: Array.isArray(group.items) ? group.items.slice() : []
      };
    });
  }

  function flattenMenuItems(groups) {
    var result = [];
    groups.forEach(function (group) {
      group.items.forEach(function (itemKey) {
        var option = findMenuPage(itemKey);
        if (option) result.push(option);
      });
    });
    return result;
  }

  function findMenuPage(key) {
    return getMenuPageOptions().find(function (item) { return item.key === key; }) || null;
  }

  function getSearchCatalog() {
    var state = getAuthState();
    var pages = getMenuPageOptions().map(function (item) {
      var keywords = {
        students: "학생 명단 번호 연락처 학급 학생관리",
        attendance: "출석 결석 지각 조퇴 출결",
        daily_memo: "메모 학급메모 일일메모 기록",
        timetable: "시간표 개인시간표 교사시간표 번호색 수업",
        counseling: "상담 상담일지 학생상담",
        observations: "관찰 기록 행동 특이사항",
        lessons: "수업 진도 계획",
        assessments: "평가 수행평가 점수",
        submissions: "제출물 과제 제출 확인",
        statistics: "통계 출력 인쇄 보고서",
        ai_analysis: "AI 분석 인공지능 추출",
        meal: "급식 식단 메뉴 밥",
        school_calendar: "캘린더 일정 행사 학사일정",
        calculator: "계산기 계산 점수",
        todos: "할일 할 일 todo 업무 체크 완료",
        settings: "설정 환경설정 학교 날씨 메뉴 바로가기",
        user_management: "회원 관리 사용자 계정 승인 차단 삭제 공지사항 공지 배포"
      };
      return {
        kind: "page",
        key: item.key,
        title: item.label,
        desc: "페이지 열기",
        text: [item.label, item.key, keywords[item.key] || ""].join(" ")
      };
    });

    var actions = [
      { key: "dashboard", title: "대시보드", desc: "홈 화면으로 이동", text: "홈 메인 대시보드 처음", run: function () { navigateTo("dashboard"); } },
      { key: "check_update", title: "업데이트 확인", desc: "새 버전 확인", text: "업데이트 확인 다운로드 설치 최신버전", run: function () { var btn = document.getElementById("update-btn"); if (btn) btn.click(); } },
      { key: "edit_layout", title: "대시보드 배열 편집", desc: "위젯 위치와 크기 변경", text: "배열 편집 위젯 위치 크기 대시보드", run: function () { navigateTo("dashboard").then(function () { var btn = document.getElementById("edit-layout-btn"); if (btn) btn.click(); }); } },
      { key: "widget_mode", title: "위젯 모드", desc: "작은 위젯 화면 전환", text: "위젯 모드 투명 미니", run: function () { var btn = document.getElementById("widget-mode-btn"); if (btn) btn.click(); } },
      { key: "opacity", title: "투명도 조절", desc: "창 투명도 패널 열기", text: "투명도 불투명 창 투명", run: function () { var btn = document.getElementById("opacity-btn"); if (btn) btn.click(); } }
    ];

    if (state.isAdmin) {
      actions.push({
        key: "notice_admin",
        title: "공지사항 배포",
        desc: "관리자 공지 작성",
        text: "공지 공지사항 배포 안내 업데이트 내용 관리자",
        run: function () { navigateTo("user_management"); }
      });
    }

    return pages.concat(actions);
  }

  function normalizeSearchText(value) {
    return String(value || "").toLowerCase().replace(/\s+/g, "");
  }

  function scoreSearchResult(query, item) {
    var q = normalizeSearchText(query);
    var title = normalizeSearchText(item.title);
    var text = normalizeSearchText(item.text + " " + item.desc);
    if (!q) return 0;
    if (title === q) return 100;
    if (title.indexOf(q) >= 0) return 85;
    if (text.indexOf(q) >= 0) return 65;

    var score = 0;
    var pos = 0;
    for (var i = 0; i < q.length; i += 1) {
      var found = text.indexOf(q[i], pos);
      if (found < 0) return 0;
      score += Math.max(2, 8 - Math.min(6, found - pos));
      pos = found + 1;
    }
    return score;
  }

  function getMenuPageOptions() {
    var state = getAuthState();
    return state.isAdmin ? MENU_PAGE_OPTIONS.concat([ADMIN_MENU_PAGE]) : MENU_PAGE_OPTIONS.slice();
  }

  function ensureAdminMenuAccess(groups) {
    var next = cloneMenuGroups(groups || DEFAULT_MENU_GROUPS);
    var isAdmin = getAuthState().isAdmin;

    next.forEach(function (group) {
      group.items = group.items.filter(function (itemKey) {
        return itemKey !== ADMIN_MENU_PAGE.key;
      });
    });

    if (!isAdmin) return next;

    var toolsGroup = next.find(function (group) {
      return group.key === "tools";
    });
    if (!toolsGroup) {
      toolsGroup = { key: "tools", label: "도구", items: [] };
      next.push(toolsGroup);
    }
    if (toolsGroup.items.indexOf(ADMIN_MENU_PAGE.key) < 0) {
      toolsGroup.items.push(ADMIN_MENU_PAGE.key);
    }
    return next;
  }

  function parseMenuGroups(raw) {
    if (!raw) return ensureAdminMenuAccess(DEFAULT_MENU_GROUPS);
    try {
      var parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) throw new Error("invalid");

      var used = {};
      var next = parsed.map(function (group, index) {
        var label = String(group.label || "").trim() || ("범주 " + (index + 1));
        var key = String(group.key || ("group_" + index)).trim() || ("group_" + index);
        var items = Array.isArray(group.items) ? group.items.filter(function (itemKey) {
          var item = findMenuPage(itemKey);
          if (!item || used[itemKey]) return false;
          used[itemKey] = true;
          return true;
        }) : [];
        return { key: key, label: label, items: items };
      }).filter(function (group) {
        return group.items.length > 0;
      });

      getMenuPageOptions().forEach(function (item) {
        if (!used[item.key]) {
          var toolsGroup = next[next.length - 1];
          if (toolsGroup) {
            toolsGroup.items.push(item.key);
          }
        }
      });

      return ensureAdminMenuAccess(next.length ? next : DEFAULT_MENU_GROUPS);
    } catch (error) {
      return ensureAdminMenuAccess(DEFAULT_MENU_GROUPS);
    }
  }

  function text(id, value) {
    var el = document.getElementById(id);
    if (el) el.textContent = value;
  }

  function ensureFirebase() {
    if (firebaseApp) return;
    if (!window.firebase || !window.__firebaseConfig) {
      throw new Error("Firebase 설정을 불러오지 못했습니다.");
    }
    firebaseApp = window.firebase.apps.length
      ? window.firebase.app()
      : window.firebase.initializeApp(window.__firebaseConfig);
    firebaseAuth = window.firebase.auth();
    firebaseDb = window.firebase.firestore();
    firebaseDb.settings({
      experimentalForceLongPolling: true
    });
    firebaseAuth.setPersistence(window.firebase.auth.Auth.Persistence.LOCAL).catch(function () {});
  }

  function normalizeEmail(value) {
    return String(value || "").trim().toLowerCase();
  }

  function parseFirebaseError(error, fallback) {
    var code = String(error && error.code || "");
    if (code === "auth/invalid-email") return "이메일 형식이 올바르지 않습니다.";
    if (code === "auth/user-not-found") return "가입되지 않은 계정입니다.";
    if (code === "auth/wrong-password") return "비밀번호가 올바르지 않습니다.";
    if (code === "auth/invalid-credential") return "이메일 또는 비밀번호가 올바르지 않습니다.";
    if (code === "auth/email-already-in-use") return "이미 가입된 이메일입니다. 로그인으로 들어가 주세요.";
    if (code === "auth/weak-password") return "비밀번호는 6자 이상으로 입력해 주세요.";
    if (code === "auth/network-request-failed") return "네트워크 연결을 확인해 주세요.";
    if (code === "permission-denied" || code === "firestore/permission-denied") {
      return "Firestore 보안 규칙이 아직 적용되지 않았습니다. Firebase 콘솔에서 규칙을 붙여넣고 배포해 주세요.";
    }
    return error && error.message ? error.message : (fallback || "로그인 처리 중 문제가 발생했습니다.");
  }

  function isAdminProfile(profile) {
    return !!profile && profile.role === "admin";
  }

  function canSyncKey(key) {
    return CLOUD_SYNC_KEYS.indexOf(key) >= 0;
  }

  function isApplyingRemoteData() {
    return remoteApplyDepth > 0;
  }

  function withRemoteApply(work) {
    remoteApplyDepth += 1;
    return Promise.resolve().then(work).finally(function () {
      remoteApplyDepth = Math.max(0, remoteApplyDepth - 1);
    });
  }

  function getLastLocalAuthUid() {
    try {
      return localStorage.getItem("teacher_app_last_auth_uid") || "";
    } catch (_) {
      return "";
    }
  }

  function setLastLocalAuthUid(uid) {
    try {
      localStorage.setItem("teacher_app_last_auth_uid", uid || "");
    } catch (_) {}
  }

  function clearSyncedLocalDataForAccountSwitch(nextUid) {
    var previousUid = getLastLocalAuthUid();
    if (!previousUid || !nextUid || previousUid === nextUid) return Promise.resolve(false);

    return withRemoteApply(function () {
      var tasks = [];
      CLOUD_SYNC_KEYS.forEach(function (key) {
        tasks.push(originalSetSetting(key, ""));
      });
      if (api.replaceTodos) tasks.push(api.replaceTodos([]));
      if (api.replaceTimetable) tasks.push(api.replaceTimetable([]));
      try {
        localStorage.removeItem("dashboard_layout_v4");
        localStorage.removeItem("dashLayout2");
      } catch (_) {}
      return Promise.all(tasks);
    }).then(function () {
      return true;
    });
  }

  function buildCloudSettingsPayload(settings) {
    var payload = {};
    CLOUD_SYNC_KEYS.forEach(function (key) {
      if (Object.prototype.hasOwnProperty.call(settings, key)) {
        payload[key] = settings[key];
      }
    });
    return payload;
  }

  function getUserDoc(uid) {
    ensureFirebase();
    return firebaseDb.collection("users").doc(uid);
  }

  function getSharedCollectionDoc(name) {
    if (!authUser) return null;
    return getUserDoc(authUser.uid).collection("shared").doc(name);
  }

  function getLocalDeviceId() {
    var key = "teacher_app_device_id";
    var saved = "";
    try {
      saved = localStorage.getItem(key) || "";
      if (!saved) {
        saved = "device-" + Date.now() + "-" + Math.random().toString(36).slice(2);
        localStorage.setItem(key, saved);
      }
    } catch (_) {
      saved = saved || ("device-" + Date.now() + "-" + Math.random().toString(36).slice(2));
    }
    return saved;
  }

  function getSessionDoc(uid) {
    ensureFirebase();
    return getUserDoc(uid).collection("session").doc("current");
  }

  function clearCloudSubscriptions() {
    cloudSubscriptions.forEach(function (unsubscribe) {
      try {
        if (typeof unsubscribe === "function") unsubscribe();
      } catch (_) {}
    });
    cloudSubscriptions = [];
  }

  function clearSessionWatch() {
    if (sessionUnsubscribe) {
      try {
        sessionUnsubscribe();
      } catch (_) {}
    }
    sessionUnsubscribe = null;
    if (sessionHeartbeatTimer) {
      clearInterval(sessionHeartbeatTimer);
      sessionHeartbeatTimer = null;
    }
    sessionTakeoverInProgress = false;
  }

  function getSessionTime(data, key) {
    var value = data ? data[key] : null;
    if (!value) return 0;
    if (typeof value.toMillis === "function") return value.toMillis();
    if (typeof value.seconds === "number") return value.seconds * 1000;
    if (typeof value === "number") return value;
    return 0;
  }

  function isSessionStale(data) {
    var lastSeen = getSessionTime(data, "lastSeenAt") || getSessionTime(data, "updatedAt");
    if (!lastSeen) return false;
    return Date.now() - lastSeen > 5 * 60 * 1000;
  }

  function writeActiveSession(user, extra) {
    var payload = Object.assign({
      deviceId: getLocalDeviceId(),
      email: normalizeEmail(user.email),
      displayName: user.displayName || "",
      status: "active",
      updatedAt: window.firebase.firestore.FieldValue.serverTimestamp(),
      lastSeenAt: window.firebase.firestore.FieldValue.serverTimestamp()
    }, extra || {});
    return getSessionDoc(user.uid).set(payload, { merge: true });
  }

  function waitForPreviousDeviceSync(uid, previousDeviceId) {
    if (!previousDeviceId) return Promise.resolve();
    return new Promise(function (resolve) {
      var settled = false;
      var unsubscribe = null;
      var timer = setTimeout(function () {
        if (settled) return;
        settled = true;
        if (unsubscribe) unsubscribe();
        resolve();
      }, 4000);
      unsubscribe = getSessionDoc(uid).onSnapshot(function (snap) {
        var data = snap.exists ? (snap.data() || {}) : {};

  function createOrUpdateUserProfile(user, displayName) {
    ensureFirebase();
    var docRef = getUserDoc(user.uid);
    return docRef.get().then(function (snap) {
      var baseData = snap.exists ? (snap.data() || {}) : null;
      if (baseData) {
        return docRef.set({
          email: normalizeEmail(user.email),
          displayName: displayName || baseData.displayName || "",
          active: baseData.active !== false,
          lastLoginAt: window.firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true }).then(function () {
          return docRef.get();
        });
      }
      return docRef.set({
        email: normalizeEmail(user.email),
        displayName: displayName || "",
        approved: true,
        active: true,
        role: "user",
        createdAt: window.firebase.firestore.FieldValue.serverTimestamp(),
        lastLoginAt: window.firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true }).then(function () {
        return docRef.get();
      });
    }).then(function (nextSnap) {
      authProfile = nextSnap.exists ? nextSnap.data() : null;
      return authProfile;
    });
  }

  function evaluateAuthenticatedUser(user) {
    var previousAuthUser = authUser;
    authUser = user || null;
    if (!user) {
      if (previousAuthUser && previousAuthUser.uid) setLastLocalAuthUid(previousAuthUser.uid);
      clearCloudSubscriptions();
      clearSessionWatch();
      authProfile = null;
      renderAuthOverlay("form", authPendingMessage, "");
      authPendingMessage = "";
      return Promise.resolve(false);
    }
    return createOrUpdateUserProfile(user, "").then(function (profile) {
      authProfile = profile || {};
      if (authProfile.deleted === true) {
        renderAuthOverlay("blocked", "이 계정은 관리자에 의해 삭제되어 사용할 수 없습니다.", normalizeEmail(user.email));
        return false;
      }
      if (authProfile.active === false) {
        renderAuthOverlay("blocked", "", normalizeEmail(user.email));
        return false;
      }
      return claimLoginSession(user).catch(function (error) {
        console.error("login session claim failed", error);
        authPendingMessage = formatLoginSessionError(error);
        return firebaseAuth.signOut().then(function () {
          return false;
        });
      }).then(function (sessionOk) {
        if (!sessionOk) return false;
        var previousLocalUid = getLastLocalAuthUid();
        var shouldMigrateLegacyDb = !previousLocalUid || previousLocalUid === user.uid;
        return Promise.resolve(api.switchUserDatabase ? api.switchUserDatabase(user.uid, { migrateLegacy: shouldMigrateLegacyDb }) : null).then(function () {
          if (api.switchUserDatabase) return true;
          return clearSyncedLocalDataForAccountSwitch(user.uid).catch(function (error) {
            console.error("account switch local clear failed", error);
            return false;
          });
        }).then(function () {
          return window.pullCloudSettingsNow().catch(function () {
            return false;
          });
        }).then(function () {
          return window.pullCloudSharedNow().catch(function () {
            return false;
          });
        }).then(function () {
          setLastLocalAuthUid(user.uid);
          return true;
        }).catch(function () {
          return false;
        }).then(function () {
          startCloudSubscriptions();
          startSessionWatch(user);
          closeAuthOverlay();
          return true;
        });
      }).catch(function (error) {
        console.error("login failed", error);
        renderAuthOverlay("form", "로그인 세션을 확인하지 못했습니다. 잠시 후 다시 시도해 주세요.", normalizeEmail(user.email));
        return false;
      });
    });
  }

  function initAuthGate() {
    ensureFirebase();
    return new Promise(function (resolve, reject) {
      firebaseAuth.onAuthStateChanged(function (user) {
        evaluateAuthenticatedUser(user).then(function (ok) {
          if (ok && !authBootResolved) {
            authBootResolved = true;

          }
        });
      });
    });
  }

  function updateUpdateButton(state) {
    var btn = document.getElementById("update-btn");
    if (!btn) return;
    var next = state || {};
    btn.disabled = false;
    btn.classList.remove("active");

    if (next.status === "dev") {
      btn.style.display = "";
      btn.textContent = "개발 실행";
      btn.disabled = true;
      btn.title = next.message || "개발 실행에서는 자동 업데이트를 확인하지 않습니다.";
      return;
    }
    if (next.status === "checking") {
      btn.style.display = "";
      btn.textContent = "업데이트 확인 중";
      btn.disabled = true;
      btn.title = next.message || "";
      return;
    }
    if (next.status === "available") {
      btn.style.display = "";
      btn.textContent = "업데이트 다운로드";
      btn.classList.add("active");
      btn.title = next.message || "";
      return;
    }
    if (next.status === "downloading") {
      btn.style.display = "";
      btn.textContent = "다운로드 " + Math.round(next.progress || 0) + "%";
      btn.disabled = true;
      btn.title = next.message || "";
      return;
    }
    if (next.status === "downloaded") {
      btn.style.display = "";
      btn.textContent = "재시작 후 설치";
      btn.classList.add("active");
      btn.title = next.message || "";
      return;
    }
    if (next.status === "error") {
      btn.style.display = "";
      btn.textContent = "업데이트 오류";
      btn.title = next.message || "";
      return;
    }
    btn.style.display = "";
    btn.textContent = "업데이트 확인";
    btn.title = next.message || "최신 버전을 확인합니다.";
  }

  function buildTopTabs() {
    var nav = document.getElementById("page-tabs");
    nav.innerHTML = "";

    menuGroups.forEach(function (group) {
      if (!group.items.length) return;

      var section = document.createElement("section");
      section.className = "tab-group";
      section.setAttribute("data-group-key", group.key);
      section.addEventListener("mouseenter", function () {
        if (closeGroupTimer) {
          clearTimeout(closeGroupTimer);
          closeGroupTimer = null;
        }
        openGroupKey = group.key;
        syncActiveTabs();
      });
      section.addEventListener("mouseleave", function () {
        closeGroupTimer = setTimeout(function () {
          if (openGroupKey === group.key) {
            openGroupKey = "";
            syncActiveTabs();
          }
        }, 140);
      });
      section.addEventListener("focusin", function () {
        openGroupKey = group.key;
        syncActiveTabs();
      });
      section.addEventListener("focusout", function () {
        setTimeout(function () {
          if (!section.contains(document.activeElement) && openGroupKey === group.key) {
            openGroupKey = "";
            syncActiveTabs();
          }
        }, 0);
      });

      var label = document.createElement("button");
      label.className = "tab-group-label";
      label.type = "button";

      var labelText = document.createElement("span");
      labelText.className = "tab-group-text";
      labelText.textContent = group.label;

      var labelValue = document.createElement("span");
      labelValue.className = "tab-group-value";
      labelValue.textContent = findMenuPage(group.items[0]).label;

      label.appendChild(labelText);
      label.appendChild(labelValue);
      label.addEventListener("click", function () {
        openGroupKey = openGroupKey === group.key ? "" : group.key;
        syncActiveTabs();
      });
      section.appendChild(label);

      var items = document.createElement("div");
      items.className = "tab-group-items";

      group.items.forEach(function (itemKey) {
        var item = findMenuPage(itemKey);
        if (!item) return;

        var button = document.createElement("button");
        button.className = "tab-link";
        button.type = "button";
        button.setAttribute("data-key", item.key);
        button.textContent = item.label;
        if (item.key === currentPage) button.classList.add("active");
        button.addEventListener("click", function () {
          openGroupKey = "";
          navigateTo(item.key);
        });
        items.appendChild(button);
      });

      section.appendChild(items);
      nav.appendChild(section);
    });

    syncActiveTabs();
  }

  function loadPage(key) {
    if (pageCache[key]) return Promise.resolve(pageCache[key]);
    return new Promise(function (resolve, reject) {
      if (window.__pages && window.__pages[key]) {
        pageCache[key] = window.__pages[key];
        resolve(window.__pages[key]);
        return;
      }

      window.__pageResolvers = window.__pageResolvers || {};
      window.__pageResolvers[key] = function (mod) {
        pageCache[key] = mod;
        resolve(mod);
      };

      var script = document.createElement("script");
      script.src = "pages/" + key + ".js";
      script.onerror = function () {
        reject(new Error("페이지를 불러올 수 없습니다: " + key));
      };
      document.head.appendChild(script);
    });
  }

  function initGlobalSearch() {
    var input = document.getElementById("global-search-input");
    var results = document.getElementById("global-search-results");
    if (!input || !results) return;

    var currentMatches = [];

    function hideResults() {
      results.style.display = "none";
      results.innerHTML = "";
    }

    function runSearchItem(item) {
      hideResults();
      input.value = "";
      input.blur();
      if (item.run) {
        item.run();
        return;
      }
      if (item.kind === "page" && item.key) navigateTo(item.key);
    }

    function renderResults() {
      var query = input.value.trim();
      if (!query) {
        hideResults();
        return;
      }

      currentMatches = getSearchCatalog()
        .map(function (item) {
          return Object.assign({}, item, { score: scoreSearchResult(query, item) });
        })
        .filter(function (item) { return item.score > 0; })
        .sort(function (a, b) { return b.score - a.score; })
        .slice(0, 8);

      if (!currentMatches.length) {
        results.innerHTML = '<div class="global-search-empty">관련 기능을 찾지 못했습니다.</div>';
        results.style.display = "block";
        return;
      }

      results.innerHTML = "";
      currentMatches.forEach(function (item, index) {
        var button = document.createElement("button");
        button.type = "button";
        button.className = "global-search-result" + (index === 0 ? " active" : "");
        button.innerHTML =
          '<span class="global-search-result-title"></span>' +
          '<span class="global-search-result-desc"></span>';
        button.querySelector(".global-search-result-title").textContent = item.title;
        button.querySelector(".global-search-result-desc").textContent = item.desc || "";
        button.addEventListener("click", function () {
          runSearchItem(item);
        });
        results.appendChild(button);
      });
      results.style.display = "block";
    }

    input.addEventListener("input", renderResults);
    input.addEventListener("focus", renderResults);
    input.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        hideResults();
        input.blur();
        return;
      }
      if (event.key === "Enter" && currentMatches[0]) {
        event.preventDefault();
        runSearchItem(currentMatches[0]);
      }
    });

    document.addEventListener("keydown", function (event) {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "k") {
        event.preventDefault();
        input.focus();
        input.select();
      }
    });

    document.addEventListener("click", function (event) {
      if (!document.getElementById("global-search").contains(event.target)) hideResults();
    });
  }

  function initSecretCodeEntry() {
    var secretCodeBuffer = "";
    var secretCodeTimer = null;
    var cachedSecretCode = "cndwntkdrh1234";

    api.getSetting("secret_grade_code", "cndwntkdrh1234").then(function (code) {
      cachedSecretCode = code || "cndwntkdrh1234";
    });

    setInterval(function () {
      api.getSetting("secret_grade_code", "cndwntkdrh1234").then(function (code) {
        cachedSecretCode = code || "cndwntkdrh1234";
      });
    }, 30000);

    window.reloadSecretCode = function () {
      api.getSetting("secret_grade_code", "cndwntkdrh1234").then(function (code) {
        cachedSecretCode = code || "cndwntkdrh1234";
      });
    };

    document.addEventListener("keydown", function (event) {
      var tag = document.activeElement ? document.activeElement.tagName : "";
      if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
      if (event.ctrlKey || event.altKey || event.metaKey) return;
      if (event.key.length !== 1) return;

      secretCodeBuffer += event.key;
      var maxLen = cachedSecretCode.length + 4;
      if (secretCodeBuffer.length > maxLen) {
        secretCodeBuffer = secretCodeBuffer.slice(-maxLen);
      }

      if (secretCodeTimer) clearTimeout(secretCodeTimer);
      secretCodeTimer = setTimeout(function () { secretCodeBuffer = ""; }, 3000);

      if (secretCodeBuffer.endsWith(cachedSecretCode)) {
        secretCodeBuffer = "";
        if (secretCodeTimer) { clearTimeout(secretCodeTimer); secretCodeTimer = null; }
        toast("성적관리 페이지를 엽니다.", "success");
        navigateTo("grades");
      }
    });
  }

  window.toast = function (msg, type, duration) {
    var actualType = type || "default";
    var actualDuration = duration || 2500;
    var el = document.createElement("div");
    el.className = "toast" + (actualType !== "default" ? " " + actualType : "");
    el.textContent = msg;
    toastContainer.appendChild(el);
    setTimeout(function () {
      el.style.opacity = "0";
      el.style.transition = "opacity .3s";
      setTimeout(function () {
        el.remove();
      }, 300);
    }, actualDuration);
  };

  window.showModal = function (html, onClose) {
    var overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = '<div class="modal">' + html + "</div>";
    overlay.addEventListener("click", function (event) {
      if (event.target === overlay) closeModal();
    });
    document.body.appendChild(overlay);

    var close = function () {
      overlay.remove();
      if (onClose) onClose();
    };

    window.__closeModal = close;
    overlay.querySelectorAll("[data-close]").forEach(function (button) {
      button.addEventListener("click", close);
    });
    return { close: close, el: overlay };
  };

  window.closeModal = function () {
    if (window.__closeModal) window.__closeModal();
  };

  window.today = function () {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };

  window.formatDate = function (str) {
    if (!str) return "";
    return str.replace(/-/g, ".");
  };

  window.diffDays = function (dateStr) {
    var now = new Date();
    now.setHours(0, 0, 0, 0);
    var target = new Date(dateStr);
    target.setHours(0, 0, 0, 0);
    return Math.round((target - now) / 86400000);
  };

  function getReleaseNoticeItems(version) {
    return [
      "할일 목록은 종료 시에도 로컬에 안전하게 저장되고, 인터넷이 있으면 클라우드에 동기화됩니다.",
      "대시보드 할일에서 완료 항목은 최근 5개만 보여 더 깔끔하게 정리됩니다.",
      "개인 시간표에서 같은 번호는 같은 색으로 표시할 수 있습니다.",
      "다른 컴퓨터에서 같은 계정으로 로그인할 때 기존 접속을 정리하는 기능이 추가되었습니다."
    ];
  }

  function showReleaseNoticeIfNeeded() {
    if (!api || !api.getAppMeta) return Promise.resolve(false);
    return Promise.all([
      api.getAppMeta(),
      window.appNoticeGet ? window.appNoticeGet().catch(function () { return null; }) : Promise.resolve(null)
    ]).then(function (results) {
      var meta = results[0];
      var remoteNotice = results[1];
      var version = String((meta && meta.version) || "dev");
      var noticeId = remoteNotice && remoteNotice.noticeId ? remoteNotice.noticeId : ("v" + version);
      var snoozeKey = "notice_snooze_until_" + noticeId;
      var readKey = "notice_read_" + noticeId;

      return Promise.all([
        api.getSetting(snoozeKey, ""),
        api.getSetting(readKey, "")
      ]).then(function (values) {
        var snoozeUntil = Number(values[0] || 0);
        var alreadyRead = values[1] === "true";
        if (alreadyRead || (snoozeUntil && Date.now() < snoozeUntil)) return false;

        var title = remoteNotice ? remoteNotice.title : "공지사항";
        var subtitle = remoteNotice && remoteNotice.version
          ? "버전 " + remoteNotice.version + " 업데이트 안내입니다."
          : "버전 " + version + " 업데이트 안내입니다.";
        var bodyHtml = "";
        if (remoteNotice && remoteNotice.body) {
          bodyHtml = String(remoteNotice.body).split(/\r?\n/).filter(function (line) {
            return line.trim();
          }).map(function (line) {
            return '<div style="line-height:1.55;margin:6px 0">' + line.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") + '</div>';
          }).join("");
        } else {
          var items = getReleaseNoticeItems(version);
          bodyHtml = '<ul style="margin:0;padding-left:20px;color:var(--text)">' + items.map(function (item) {
            return '<li style="margin:8px 0;line-height:1.45">' + item + '</li>';
          }).join("") + '</ul>';
        }

        showModal(
          '<div class="modal-header">' +
            '<span class="modal-title">' + title.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") + '</span>' +
            '<button class="modal-close" data-close>×</button>' +
          '</div>' +
          '<div class="modal-body" style="display:grid;gap:14px">' +
            '<div style="font-size:13px;color:var(--text2)">' + subtitle + '</div>' +
            '<div style="color:var(--text)">' + bodyHtml + '</div>' +
            '<div style="font-size:12px;color:var(--text3)">업데이트 후 달라진 기능을 이해하기 쉽게 알려드리는 공지입니다.</div>' +
          '</div>' +
          '<div class="modal-footer">' +
            '<button class="btn btn-secondary" id="notice-snooze-week">일주일 간 보지 않기</button>' +
            '<button class="btn btn-primary" id="notice-ok">확인</button>' +
          '</div>'
        );

        setTimeout(function () {
          var snoozeButton = document.getElementById("notice-snooze-week");
          var okButton = document.getElementById("notice-ok");
          if (snoozeButton) {
            snoozeButton.onclick = function () {
              api.setSetting(snoozeKey, String(Date.now() + 7 * 24 * 60 * 60 * 1000)).finally(function () {
                closeModal();
              });
            };
          }
          if (okButton) {
            okButton.onclick = function () {
              api.setSetting(readKey, "true").finally(function () {
                closeModal();
              });
            };
          }
        }, 0);

        return true;
      });
    }).catch(function (error) {
      console.error("release notice failed", error);
      return false;
    });
  }

  Promise.resolve()
    .then(function () {
      initWindowButtons();
      initGlobalSearch();
      initSecretCodeEntry();
      initHomeButton();
      initUpdateButton();
      initWidgetButton();
      initEditButton();
      initOpacityPanel();
      updateDate();
      setInterval(updateDate, 60000);
      return initAuthGate();
    })
    .then(function () {
      return window.reloadTopNavigation();
    })
    .then(function () {
      return updateClassInfo();
    })
    .then(function () {
      return navigateTo("dashboard");
    })
    .then(function () {
      setTimeout(showReleaseNoticeIfNeeded, 600);
    })
    .catch(function (error) {
      document.getElementById("page-tabs").innerHTML =
        '<div style="padding:12px 18px;color:#d14343;font-weight:600">탭을 불러오지 못했습니다.</div>';
      showError(error.message);
      console.error(error);
    });
})();
</script>
</body>
</html>
